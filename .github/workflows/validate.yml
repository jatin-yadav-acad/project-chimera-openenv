name: OpenEnv Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OpenEnv
        run: |
          python -m pip install --upgrade pip
          python -m pip install openenv

      - name: Validate OpenEnv Config
        run: |
          python -c "import openenv; print('OpenEnv installed OK')"
          python -m openenv.cli.main validate .